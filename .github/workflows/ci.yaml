name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  cli:
    name: CLI build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

  servers:
    name: Build servers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server:
          - kube-explore
          - git
          - github
          - gitlab
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build ${{ matrix.server }}
        working-directory: servers/${{ matrix.server }}
        run: CGO_ENABLED=0 go build -v ./...

      - name: Vet ${{ matrix.server }}
        working-directory: servers/${{ matrix.server }}
        run: go vet ./...

      - name: Validate manifest.json
        run: |
          if [ ! -f "servers/${{ matrix.server }}/manifest.json" ]; then
            echo "ERROR: servers/${{ matrix.server }}/manifest.json missing"
            exit 1
          fi
          echo "OK: ${{ matrix.server }}"
