name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  validate-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tool packages
        run: |
          for dir in tools/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            # Pi tools have index.js/ts, MCP tools have manifest.json
            if [ -f "${dir}index.js" ] || [ -f "${dir}index.ts" ]; then
              echo "OK: ${name} (Pi tool)"
            elif [ -f "${dir}manifest.json" ]; then
              echo "OK: ${name} (MCP tool)"
            else
              echo "ERROR: ${name} missing index.js/ts or manifest.json"
              exit 1
            fi
          done

      - name: Validate agent packages
        run: |
          for dir in agents/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            if [ ! -f "${dir}index.js" ] && [ ! -f "${dir}index.ts" ]; then
              echo "ERROR: ${name} missing index.js or index.ts"
              exit 1
            fi
            echo "OK: ${name}"
          done
