name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  validate-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Validate all tool manifests
        run: |
          for dir in catalog/*/; do
            manifest="${dir}tool.yaml"
            if [ -f "$manifest" ]; then
              echo "Validating $manifest..."
              go run ./cmd/cli tool build -f "$manifest" -t validate:test --help > /dev/null || true
            fi
          done
