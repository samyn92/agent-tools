name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  tool-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - kubectl
          - github-cli
          - gitlab-cli
          - helm
          - git
          - terraform
          - aws-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build tool image
        run: |
          go run ./cmd/cli tool build \
            -f catalog/${{ matrix.tool }}/tool.yaml \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/tool-${{ matrix.tool }}:${{ steps.version.outputs.version }} \
            --gateway-version v${{ steps.version.outputs.version }} \
            --push

      - name: Tag as latest
        run: |
          docker tag \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tool-${{ matrix.tool }}:${{ steps.version.outputs.version }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tool-${{ matrix.tool }}:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/tool-${{ matrix.tool }}:latest

  cli-binary:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o agent-tools-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-tools-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent-tools-${{ matrix.goos }}-${{ matrix.goarch }}
