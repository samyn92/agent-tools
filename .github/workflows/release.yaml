name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes

  cli-release:
    name: CLI binaries
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o agent-tools-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/agent-tools

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" agent-tools-${{ matrix.goos }}-${{ matrix.goarch }} --clobber

  server-packages:
    name: MCP server OCI artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server:
          - kube-explore
          - git
          - github
          - gitlab
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build CLI
        run: go build -o ./agent-tools ./cmd/agent-tools

      - name: Build ${{ matrix.server }} server binary
        working-directory: servers/${{ matrix.server }}
        run: |
          mkdir -p dist/bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o dist/bin/${{ matrix.server }} .
          cp manifest.json dist/

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.server }}
        run: |
          ref="${{ env.REGISTRY }}/${{ github.repository_owner }}/agent-tools/${{ matrix.server }}:${{ steps.version.outputs.version }}"
          echo "Pushing ${{ matrix.server }} -> ${ref}"
          ./agent-tools push servers/${{ matrix.server }}/dist/ -t "$ref"

          ref_latest="${{ env.REGISTRY }}/${{ github.repository_owner }}/agent-tools/${{ matrix.server }}:latest"
          echo "Tagging as latest"
          ./agent-tools push servers/${{ matrix.server }}/dist/ -t "$ref_latest"
