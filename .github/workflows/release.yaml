name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes

  cli-release:
    name: CLI binaries
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o agent-tools-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/agent-tools

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" agent-tools-${{ matrix.goos }}-${{ matrix.goarch }} --clobber

  server-packages:
    name: MCP server OCI artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server:
          - kube-explore
          - git
          - github
          - gitlab
          - kubectl
          - flux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build CLI
        run: go build -o ./agent-tools ./cmd/agent-tools

      - name: Build ${{ matrix.server }} server binary
        working-directory: servers/${{ matrix.server }}
        run: |
          mkdir -p dist/bin
          # For servers that bundle a CLI binary alongside the MCP server,
          # name the MCP binary with mcp- prefix to avoid collision.
          case "${{ matrix.server }}" in
            kubectl|flux) BIN_NAME="mcp-${{ matrix.server }}" ;;
            *) BIN_NAME="${{ matrix.server }}" ;;
          esac
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o "dist/bin/${BIN_NAME}" .
          cp manifest.json dist/

      - name: Bundle kubectl CLI binary
        if: matrix.server == 'kubectl'
        run: |
          KUBE_VERSION=$(curl -sL https://dl.k8s.io/release/stable.txt)
          echo "Downloading kubectl ${KUBE_VERSION}"
          curl -sLo servers/kubectl/dist/bin/kubectl \
            "https://dl.k8s.io/release/${KUBE_VERSION}/bin/linux/amd64/kubectl"
          chmod +x servers/kubectl/dist/bin/kubectl

      - name: Bundle flux CLI binary
        if: matrix.server == 'flux'
        run: |
          FLUX_VERSION=$(curl -sL https://api.github.com/repos/fluxcd/flux2/releases/latest | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/')
          echo "Downloading flux ${FLUX_VERSION}"
          curl -sLo /tmp/flux.tar.gz \
            "https://github.com/fluxcd/flux2/releases/download/v${FLUX_VERSION}/flux_${FLUX_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/flux.tar.gz -C servers/flux/dist/bin/ flux
          chmod +x servers/flux/dist/bin/flux

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.server }}
        run: |
          ref="${{ env.REGISTRY }}/${{ github.repository_owner }}/agent-tools/${{ matrix.server }}:${{ steps.version.outputs.version }}"
          echo "Pushing ${{ matrix.server }} -> ${ref}"
          ./agent-tools push servers/${{ matrix.server }}/dist/ -t "$ref"

          ref_latest="${{ env.REGISTRY }}/${{ github.repository_owner }}/agent-tools/${{ matrix.server }}:latest"
          echo "Tagging as latest"
          ./agent-tools push servers/${{ matrix.server }}/dist/ -t "$ref_latest"

  server-images:
    name: MCP server container images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server:
          - git
          - github
          - gitlab
          - kubectl
          - kube-explore
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.server }}-server
        uses: docker/build-push-action@v6
        with:
          context: servers/${{ matrix.server }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/agent-tools/${{ matrix.server }}-server:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/agent-tools/${{ matrix.server }}-server:latest
