name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  # Build tool container images (kubectl, github-cli, etc.) from catalog/
  tool-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - kubectl
          - github-cli
          - gitlab-cli
          - helm
          - git
          - terraform
          - aws-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build tool image
        run: |
          go run ./cmd/cli tool build \
            -f catalog/${{ matrix.tool }}/tool.yaml \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/tool-${{ matrix.tool }}:${{ steps.version.outputs.version }} \
            --platforms linux/amd64,linux/arm64 \
            --push

      - name: Tag as latest
        run: |
          docker buildx imagetools create \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/tool-${{ matrix.tool }}:${{ steps.version.outputs.version }} \
            --tag ${{ env.REGISTRY }}/${{ github.repository_owner }}/tool-${{ matrix.tool }}:latest

  # Build CLI binaries and attach to GitHub Release
  cli-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o agent-tools-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/cli

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" agent-tools-${{ matrix.goos }}-${{ matrix.goarch }} --clobber

  # Push tool packages (tools/*/) as OCI artifacts to ghcr.io
  tool-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build CLI
        run: go build -o ./agent-tools ./cmd/cli

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tool packages
        run: |
          for dir in tools/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            ref="${{ env.REGISTRY }}/${{ github.repository_owner }}/agent-tools/${name}:${{ steps.version.outputs.version }}"
            echo "Pushing ${name} → ${ref}"
            ./agent-tools push tool "$dir" -t "$ref"
            echo "Tagging as latest"
            ref_latest="${{ env.REGISTRY }}/${{ github.repository_owner }}/agent-tools/${name}:latest"
            ./agent-tools push tool "$dir" -t "$ref_latest"
          done
