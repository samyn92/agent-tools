apiVersion: tools.agents.io/v1
kind: ToolPackage
metadata:
  name: terraform
  version: "1.7.5"
  description: Infrastructure as Code tool for cloud resources

cli:
  binary: terraform
  download:
    url: https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
    extract: zip
    path: terraform
    chmod: "755"

# Embedded deny patterns - baked into image, CANNOT be overridden by Tool CRD
deny:
  # Destructive operations without approval
  - "terraform destroy *"
  - "terraform apply -auto-approve *"
  
  # Force flags
  - "*-force*"
  - "*--force*"
  
  # State manipulation (dangerous)
  - "terraform state rm *"
  - "terraform state mv *"
  - "terraform state push *"
  - "terraform import *"
  
  # Workspace deletion
  - "terraform workspace delete *"
  
  # Taint/untaint (can cause destruction)
  - "terraform taint *"
  - "terraform untaint *"
  
  # Login/logout (credential management)
  - "terraform login *"
  - "terraform logout *"

env:
  - name: AWS_ACCESS_KEY_ID
    description: AWS access key for provider authentication
    required: false
  - name: AWS_SECRET_ACCESS_KEY
    description: AWS secret key for provider authentication
    required: false
  - name: ARM_CLIENT_ID
    description: Azure client ID for provider authentication
    required: false
  - name: ARM_CLIENT_SECRET
    description: Azure client secret for provider authentication
    required: false
  - name: GOOGLE_CREDENTIALS
    description: GCP service account JSON for provider authentication
    required: false
