apiVersion: tools.agents.io/v1
kind: ToolPackage
metadata:
  name: git
  version: "2.43.0"
  description: Git version control with worktree support for isolated workspaces

cli:
  binary: git
  apk: git

# Embedded deny patterns - baked into image, CANNOT be overridden by Agent CRD
deny:
  # Force push - can destroy remote history
  - "git push --force*"
  - "git push *--force*"
  - "git push -f *"
  - "git push *-f *"
  
  # Hard reset - can lose local changes
  - "git reset --hard*"
  - "git reset *--hard*"
  
  # Clean with force - deletes untracked files permanently
  - "git clean -f*"
  - "git clean *-f*"
  - "git clean -d*"
  
  # History rewriting - dangerous on shared branches
  - "git rebase *"
  - "git filter-branch *"
  - "git filter-repo *"
  
  # Credential/config manipulation
  - "git config *credential*"
  - "git config *token*"
  - "git config *password*"
  - "git config --global *"
  - "git config --system *"
  
  # Remote manipulation - should use configured remotes only
  - "git remote add *"
  - "git remote remove *"
  - "git remote set-url *"
  - "git remote rename *"
  
  # Submodule - potential security risks
  - "git submodule *"
  
  # Hooks - code execution risk
  - "git config core.hooksPath *"

# Recommended operations for agents (informational, not enforced)
recommended:
  - "git clone"
  - "git fetch"
  - "git pull"
  - "git checkout"
  - "git switch"
  - "git branch"
  - "git add"
  - "git commit"
  - "git push"
  - "git status"
  - "git log"
  - "git diff"
  - "git show"
  - "git worktree add"
  - "git worktree list"
  - "git worktree remove"

env:
  - name: GITHUB_TOKEN
    description: GitHub token for HTTPS authentication (used as password)
    required: false
  - name: GITLAB_TOKEN
    description: GitLab token for HTTPS authentication
    required: false
  - name: GIT_AUTHOR_NAME
    description: Author name for commits
    required: true
  - name: GIT_AUTHOR_EMAIL
    description: Author email for commits
    required: true
  - name: GIT_COMMITTER_NAME
    description: Committer name (defaults to GIT_AUTHOR_NAME)
    required: false
  - name: GIT_COMMITTER_EMAIL
    description: Committer email (defaults to GIT_AUTHOR_EMAIL)
    required: false

# Workspace configuration
workspace:
  # Default path structure
  basePath: /workspace/.repos      # Base clones stored here
  worktreePath: /workspace/tasks   # Worktrees for each task
  
  # Git configuration applied to workspace
  gitConfig:
    - key: init.defaultBranch
      value: main
    - key: push.autoSetupRemote
      value: "true"
    - key: advice.detachedHead
      value: "false"
