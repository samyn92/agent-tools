apiVersion: tools.agents.io/v1
kind: ToolPackage
metadata:
  name: helm
  version: "3.14.0"
  description: Helm CLI for inspecting installed releases and chart values

cli:
  binary: helm
  download:
    url: https://get.helm.sh/helm-v3.14.0-linux-amd64.tar.gz
    extract: tar.gz
    path: linux-amd64/helm
    chmod: "755"

# Embedded deny patterns - baked into image, CANNOT be overridden
# Default: READ-ONLY operations only for safety
deny:
  # Installation/upgrade operations (requires explicit allow)
  - "helm install *"
  - "helm upgrade *"
  - "helm uninstall *"
  - "helm delete *"
  - "helm rollback *"
  
  # Repository management
  - "helm repo add *"
  - "helm repo remove *"
  - "helm repo update *"
  
  # Plugin management
  - "helm plugin *"
  
  # Registry operations
  - "helm push *"
  - "helm registry *"
  
  # Package creation
  - "helm package *"
  
  # Test execution (can trigger actions)
  - "helm test *"
  
  # Force flags
  - "*--force*"
  - "*--wait*"  # Can hang indefinitely

env:
  - name: KUBECONFIG
    description: Path to kubeconfig file (usually mounted as a volume)
    required: false
  - name: HELM_NAMESPACE
    description: Default namespace for Helm operations
    required: false
